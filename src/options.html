<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Mastodon 同步设置</title>
  <style>
    body { font-family: sans-serif; padding: 20px; line-height: 1.6; max-width: 400px; }
    h2 { color: #2e7d32; }
    .field { margin-bottom: 15px; }
    label { display: block; font-weight: bold; margin-bottom: 5px; }
    input { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
    button { background: #2e7d32; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; width: 100%; }
    button:hover { background: #1b5e20; }
    #status { margin-top: 10px; color: #d32f2f; font-size: 0.9em; }
  </style>
</head>
<body>
  <h2>Mastodon 同步配置</h2>
  
  <div class="field">
    <label>Mastodon 实例域名</label>
    <input type="text" id="instance" placeholder="例如: https://cmx.im">
  </div>

  <div class="field">
    <label>Access Token</label>
    <input type="password" id="token" placeholder="在此粘贴你的令牌">
  </div>

  <button id="save">保存设置</button>
  <p id="status"></p>

  <script src="options.js"></script>
</body>
</html>
